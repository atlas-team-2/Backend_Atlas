openapi: 3.1.0
info:
  title: Атлас народов
  version: 1.1.0
  description: OpenAPI-спецификация для MVP проекта «Атлас народов».
servers:
- url: https://api.atlas.example.com
  description: Production
- url: http://localhost:8000
  description: Local development
tags:
- name: Auth
- name: Nations
- name: Nation Info
- name: Settlement Zones
- name: Costumes
- name: Costume Generations
- name: Games
- name: Game Questions
- name: Game Options
- name: Game Sessions
- name: Comments
- name: Users
- name: Moderation
paths:
  /api/v1/auth/register:
    post:
      tags:
      - Auth
      summary: Регистрация пользователя
      description: Создаёт нового пользователя в системе.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Пользователь успешно зарегистрирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              examples:
                success:
                  summary: Успешная регистрация
                  value:
                    success: true
                    message: Пользователь успешно зарегистрирован
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/auth/login:
    post:
      tags:
      - Auth
      summary: Login and get access token pair
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/auth/logout:
    post:
      tags:
      - Auth
      summary: Logout current user
      responses:
        '204':
          description: Logged out
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
      security:
      - oauth2:
        - auth:logout
  /api/v1/auth/me:
    get:
      tags:
      - Auth
      summary: Get current user profile
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
      security:
      - oauth2:
        - profile:read
  /api/v1/nations:
    get:
      tags:
      - Nations
      summary: Get list of nations
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - $ref: '#/components/parameters/SortOrder'
      - name: search
        in: query
        schema:
          type: string
      - name: slug
        in: query
        schema:
          type: string
      - name: population_min
        in: query
        schema:
          type: integer
          minimum: 0
      - name: population_max
        in: query
        schema:
          type: integer
          minimum: 0
      - name: status
        in: query
        schema:
          type: string
          enum:
          - draft
          - published
          - archived
      - name: sort_by
        in: query
        schema:
          type: string
          enum:
          - name
          - population
          - created_at
          default: name
      responses:
        '200':
          description: Nation list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NationListResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags:
      - Nations
      summary: Create nation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NationCreateRequest'
      responses:
        '201':
          description: Nation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Nation'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
      security:
      - oauth2:
        - nation:write
  /api/v1/nations/{nation_id}:
    get:
      tags:
      - Nations
      summary: Get nation by id
      parameters:
      - $ref: '#/components/parameters/NationId'
      responses:
        '200':
          description: Nation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NationDetails'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags:
      - Nations
      summary: Update nation
      parameters:
      - $ref: '#/components/parameters/NationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NationUpdateRequest'
      responses:
        '200':
          description: Nation updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Nation'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
      security:
      - oauth2:
        - nation:write
    delete:
      tags:
      - Nations
      summary: Delete nation
      parameters:
      - $ref: '#/components/parameters/NationId'
      responses:
        '204':
          description: Nation deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
      security:
      - oauth2:
        - nation:write
  /api/v1/nations/{nation_id}/info:
    get:
      tags:
      - Nation Info
      summary: Get nation info
      parameters:
      - $ref: '#/components/parameters/NationId'
      responses:
        '200':
          description: Nation info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NationInfo'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags:
      - Nation Info
      summary: Create or update nation info
      parameters:
      - $ref: '#/components/parameters/NationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NationInfoUpsertRequest'
      responses:
        '200':
          description: Nation info upserted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NationInfo'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
      security:
      - oauth2:
        - nation:write
  /api/v1/nations/{nation_id}/info/moderation:
    patch:
      tags:
      - Moderation
      - Nation Info
      summary: Moderate nation info publication status
      parameters:
      - $ref: '#/components/parameters/NationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContentModerationRequest'
      responses:
        '200':
          description: Nation info moderated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModerationActionResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
      security:
      - oauth2:
        - nation:moderate
  /api/v1/nations/{nation_id}/settlement-zones:
    get:
      tags:
      - Settlement Zones
      summary: Get settlement zones for nation
      parameters:
      - $ref: '#/components/parameters/NationId'
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - name: region_name
        in: query
        schema:
          type: string
      - name: color
        in: query
        schema:
          type: string
          pattern: ^#[0-9A-Fa-f]{6}$
      - name: status
        in: query
        schema:
          type: string
          enum:
          - draft
          - published
          - rejected
      - name: sort_by
        in: query
        schema:
          type: string
          enum:
          - region_name
          - created_at
          default: region_name
      - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: Settlement zone list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementZoneListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags:
      - Settlement Zones
      summary: Create settlement zone for nation
      parameters:
      - $ref: '#/components/parameters/NationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettlementZoneCreateRequest'
      responses:
        '201':
          description: Settlement zone created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementZone'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
      security:
      - oauth2:
        - nation:write
  /api/v1/nations/{nation_id}/settlement-zones/{zone_id}:
    get:
      tags:
      - Settlement Zones
      summary: Get settlement zone by id within nation
      parameters:
      - $ref: '#/components/parameters/NationId'
      - $ref: '#/components/parameters/ZoneId'
      responses:
        '200':
          description: Settlement zone
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementZone'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags:
      - Settlement Zones
      summary: Update settlement zone
      parameters:
      - $ref: '#/components/parameters/NationId'
      - $ref: '#/components/parameters/ZoneId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettlementZoneUpdateRequest'
      responses:
        '200':
          description: Settlement zone updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementZone'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
      security:
      - oauth2:
        - nation:write
    delete:
      tags:
      - Settlement Zones
      summary: Delete settlement zone
      parameters:
      - $ref: '#/components/parameters/NationId'
      - $ref: '#/components/parameters/ZoneId'
      responses:
        '204':
          description: Settlement zone deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
      security:
      - oauth2:
        - nation:write
  /api/v1/nations/{nation_id}/settlement-zones/{zone_id}/moderation:
    patch:
      tags:
      - Moderation
      - Settlement Zones
      summary: Moderate settlement zone publication status
      parameters:
      - $ref: '#/components/parameters/NationId'
      - $ref: '#/components/parameters/ZoneId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContentModerationRequest'
      responses:
        '200':
          description: Settlement zone moderated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModerationActionResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
      security:
      - oauth2:
        - nation:moderate
  /api/v1/nations/{nation_id}/costumes:
    get:
      tags:
      - Costumes
      summary: Get costumes for nation
      parameters:
      - $ref: '#/components/parameters/NationId'
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - name: gender
        in: query
        schema:
          type: string
      - name: status
        in: query
        schema:
          type: string
          enum:
          - draft
          - published
          - rejected
      - name: created_from
        in: query
        schema:
          type: string
          format: date-time
      - name: created_to
        in: query
        schema:
          type: string
          format: date-time
      - name: sort_by
        in: query
        schema:
          type: string
          enum:
          - created_at
          - gender
          default: created_at
      - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: Costume list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostumeListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags:
      - Costumes
      summary: Create costume for nation
      parameters:
      - $ref: '#/components/parameters/NationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CostumeCreateRequest'
      responses:
        '201':
          description: Costume created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Costume'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
      security:
      - oauth2:
        - costume:write
  /api/v1/nations/{nation_id}/costumes/{costume_id}:
    get:
      tags:
      - Costumes
      summary: Get costume by id
      parameters:
      - $ref: '#/components/parameters/NationId'
      - $ref: '#/components/parameters/CostumeId'
      responses:
        '200':
          description: Costume
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Costume'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags:
      - Costumes
      summary: Update costume
      parameters:
      - $ref: '#/components/parameters/NationId'
      - $ref: '#/components/parameters/CostumeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CostumeUpdateRequest'
      responses:
        '200':
          description: Costume updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Costume'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
      security:
      - oauth2:
        - costume:write
    delete:
      tags:
      - Costumes
      summary: Delete costume
      parameters:
      - $ref: '#/components/parameters/NationId'
      - $ref: '#/components/parameters/CostumeId'
      responses:
        '204':
          description: Costume deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
      security:
      - oauth2:
        - costume:write
  /api/v1/nations/{nation_id}/costumes/{costume_id}/moderation:
    patch:
      tags:
      - Moderation
      - Costumes
      summary: Moderate costume publication status
      parameters:
      - $ref: '#/components/parameters/NationId'
      - $ref: '#/components/parameters/CostumeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContentModerationRequest'
      responses:
        '200':
          description: Costume moderated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModerationActionResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
      security:
      - oauth2:
        - nation:moderate
  /api/v1/costume-generations:
    get:
      tags:
      - Costume Generations
      summary: Get current user's costume generation history
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - name: nation_id
        in: query
        schema:
          type: string
          format: uuid
      - name: status
        in: query
        schema:
          type: string
          enum:
          - pending
          - completed
          - failed
      responses:
        '200':
          description: Generation history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostumeGenerationListResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
      security:
      - oauth2:
        - costume:generate
    post:
      tags:
      - Costume Generations
      summary: Generate costume and store result for current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CostumeGenerationCreateRequest'
      responses:
        '201':
          description: Generation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostumeGeneration'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
      security:
      - oauth2:
        - costume:generate
  /api/v1/costume-generations/{generation_id}:
    get:
      tags:
      - Costume Generations
      summary: Get costume generation result by id
      parameters:
      - $ref: '#/components/parameters/GenerationId'
      responses:
        '200':
          description: Generation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostumeGeneration'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
      security:
      - oauth2:
        - costume:generate
  /api/v1/nations/{nation_id}/games:
    get:
      tags:
      - Games
      summary: Get games for nation
      parameters:
      - $ref: '#/components/parameters/NationId'
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - name: type
        in: query
        schema:
          type: string
      - name: is_active
        in: query
        schema:
          type: boolean
      - name: title
        in: query
        schema:
          type: string
      - name: status
        in: query
        schema:
          type: string
          enum:
          - draft
          - published
          - archived
      - name: sort_by
        in: query
        schema:
          type: string
          enum:
          - title
          - type
          - is_active
          default: title
      - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: Game list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags:
      - Games
      summary: Create game for nation
      parameters:
      - $ref: '#/components/parameters/NationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameCreateRequest'
      responses:
        '201':
          description: Game created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
      security:
      - oauth2:
        - game:write
  /api/v1/nations/{nation_id}/games/{game_id}:
    get:
