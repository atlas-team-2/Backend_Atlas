          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
      security:
      - oauth2:
        - user:write
    delete:
      tags:
      - Users
      summary: Delete user
      parameters:
      - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: User deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
      security:
      - oauth2:
        - user:write
components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: OAuth2 authorizationCode flow with scopes-based role model.
      flows:
        authorizationCode:
          authorizationUrl: https://auth.atlas.example.com/oauth/authorize
          tokenUrl: https://auth.atlas.example.com/oauth/token
          refreshUrl: https://auth.atlas.example.com/oauth/refresh
          scopes:
            auth:logout: Logout current user session
            profile:read: Read own profile
            nation:read: Read protected nation data
            nation:write: Create and update nations and nested nation content
            nation:moderate: Moderate nation-related content
            comment:read: Read protected comments
            comment:write: Create and edit own comments
            comment:moderate: Approve, reject, hide comments
            game:read: Read protected games and questions
            game:write: Create and update games, questions and options
            game:play: Start game sessions and submit answers
            game:moderate: Moderate games and their publication status
            costume:read: Read protected costume data
            costume:write: Create and update costumes
            costume:generate: Generate and view own costume generation results
            user:read: Read users
            user:write: Create, update and delete users
  parameters:
    Page:
      name: page
      in: query
      description: Page number
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      description: Page size
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    SortOrder:
      name: sort_order
      in: query
      description: Sort direction
      schema:
        type: string
        enum:
        - asc
        - desc
        default: asc
    NationId:
      name: nation_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ZoneId:
      name: zone_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CostumeId:
      name: costume_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    GenerationId:
      name: generation_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    GameId:
      name: game_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    QuestionId:
      name: question_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OptionId:
      name: option_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CommentId:
      name: comment_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Unauthorized:
      description: Authentication required or access token is invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            unauthorized:
              value:
                code: unauthorized
                message: Authentication required or token is invalid
                details: null
                trace_id: 9f8b91fb-e6df-4d95-a586-2f23d6f53c0a
    Forbidden:
      description: Authenticated user does not have the required scope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            forbidden:
              value:
                code: forbidden
                message: Insufficient permissions for this operation
                details:
                  required_scope: nation:write
                trace_id: 68c0a0e8-844f-4135-8fcc-fd59d4360d6d
    ValidationError:
      description: Validation error in request body, path or query params
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            validation_failed:
              value:
                code: validation_error
                message: Request validation failed
                details:
                  email: invalid email format
                trace_id: 4cf53fa3-bb4a-4f03-8a78-f7121fd74050
    NotFound:
      description: Entity not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Unique constraint or business rule conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            internal_error:
              value:
                code: internal_error
                message: Unexpected server error
                details: null
                trace_id: 8ed1d863-985d-4c88-a562-fcfb5c1fe2a4
  schemas:
    SuccessResponse:
      type: object
      required:
      - success
      - message
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Пользователь успешно зарегистрирован
    ErrorResponse:
      type: object
      required:
      - code
      - message
      - trace_id
      properties:
        code:
          type: string
        message:
          type: string
        details:
          oneOf:
          - type: object
            additionalProperties: true
          - type: 'null'
        trace_id:
          type: string
          format: uuid
