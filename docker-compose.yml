name: atlas-compose

x-back-image: &back-image asilya18/backend-atlas:latest
x-front-image: &front-image nginx:stable-alpine

x-base: &base
  image: *back-image
  env_file:
    - .env
  environment:
    DB__HOST: db

services:
  db:
    image: postgres:18
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB__USER}
      POSTGRES_PASSWORD: ${DB__PASSWORD}
      POSTGRES_DB: ${DB__NAME}
    volumes:
      - pgdata:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  alembic:
    <<: *base
    depends_on:
      db:
        condition: service_healthy
    command: ["/app/.venv/bin/alembic", "upgrade", "head"]
    restart: on-failure

  rbac:
    <<: *base
    depends_on:
      alembic:
        condition: service_completed_successfully
    command: ["/app/.venv/bin/python", "init.py"]
    restart: on-failure

  api:
    <<: *base
    depends_on:
      rbac:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

  web:
    image: *front-image
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/var/www/html:ro
    depends_on:
      api:
        condition: service_healthy
    restart: always

volumes:
  pgdata: